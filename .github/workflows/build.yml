name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk

      - name: Install Buildozer
        run: |
          pip install buildozer cython

      - name: Init buildozer
        run: buildozer init

      - name: Modify spec
        run: |
          sed -i 's/title = .*/title = Flappy/' buildozer.spec
          sed -i 's/package.name = .*/package.name = flappy/' buildozer.spec
          sed -i 's/package.domain = .*/package.domain = org.test/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec

      - name: Build APK
        run: buildozer -v android debug
